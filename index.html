<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>س ي ف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* ===== LANDING PAGE ===== */
        .landing-page {
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .landing-dollars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dollar-rain {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(120, 120, 120, 0.25);
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            text-align: center;
            z-index: 10;
        }

        .name {
            font-size: 2rem;
            font-weight: bold;
            color: #666666;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.4),
                         0 0 60px rgba(255, 0, 0, 0.15);
        }

        .name:hover {
            transform: scale(1.15);
            color: #888888;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.6),
                         0 0 80px rgba(255, 0, 0, 0.25);
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.5) 0%, rgba(255, 0, 0, 0.15) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse-glow 2s ease-in-out infinite;
            z-index: 1;
        }

        .glow-effect-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse-glow-2 5s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes pulse-glow-2 {
            0%, 100% {
                opacity: 0.2;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.35;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        /* ===== PORTFOLIO PAGE ===== */
        .portfolio-container {
            width: 100%;
            background: #000000;
            display: none;
            position: relative;
        }

        .portfolio-bg-dollars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .dollar-bg {
            position: absolute;
            font-size: 2rem;
            color: rgba(100, 100, 100, 0.2);
            animation: fall-slow linear infinite;
            pointer-events: none;
        }

        @keyframes fall-slow {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .photo-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .photo-section:first-of-type {
            padding-top: 60px;
            padding-bottom: 20px;
        }

        .photo-section:last-of-type {
            padding-top: 20px;
            padding-bottom: 60px;
        }

        .section-wrapper {
            position: relative;
            width: 80%;
            aspect-ratio: 9 / 16;
            max-width: 450px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 12px;
        }

        .portfolio-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            transition: filter 0.3s ease, transform 0.3s ease;
            filter: brightness(0.85);
            box-shadow: none;
            transform: scale(1.05);
        }

        .portfolio-img.active {
            filter: brightness(0.5);
            animation: dark-red-flash 0.4s ease;
        }

        @keyframes dark-red-flash {
            0% {
                filter: brightness(0.85);
            }
            50% {
                filter: brightness(0.4) sepia(0.4);
            }
            100% {
                filter: brightness(0.5);
            }
        }

        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        /* ===== FOOTER TEXT ===== */
        .footer-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            text-align: center;
            pointer-events: none;
        }

        .footer-text p {
            font-size: 0.95rem;
            color: #888888;
            letter-spacing: 1px;
            line-height: 1.6;
            font-weight: 300;
        }

        .landing-page.hidden {
            display: none;
        }

        .portfolio-container.active {
            display: block;
        }

        @media (max-width: 768px) {
            .name {
                font-size: 1.5rem;
                letter-spacing: 3px;
            }

            .glow-effect {
                width: 200px;
                height: 200px;
            }

            .glow-effect-2 {
                width: 350px;
                height: 250px;
            }

            .photo-section:first-of-type {
                padding-top: 50px;
                padding-bottom: 15px;
            }

            .photo-section:last-of-type {
                padding-top: 15px;
                padding-bottom: 50px;
            }

            .section-wrapper {
                width: 80%;
                aspect-ratio: 9 / 16;
                max-width: 400px;
            }

            .footer-text p {
                font-size: 0.88rem;
            }
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .glow-effect {
                width: 150px;
                height: 150px;
                filter: blur(50px);
            }

            .glow-effect-2 {
                width: 250px;
                height: 180px;
                filter: blur(80px);
            }

            .photo-section:first-of-type {
                padding-top: 40px;
                padding-bottom: 10px;
            }

            .photo-section:last-of-type {
                padding-top: 10px;
                padding-bottom: 40px;
            }

            .section-wrapper {
                width: 85%;
                aspect-ratio: 9 / 16;
                max-width: 320px;
            }

            .dollar-rain {
                font-size: 1.5rem;
            }

            .dollar-bg {
                font-size: 1.2rem;
            }

            .footer-text p {
                font-size: 0.8rem;
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <!-- LANDING PAGE -->
    <div class="landing-page" id="landingPage">
        <div class="landing-dollars" id="landingDollars"></div>
        <div class="container">
            <div class="glow-effect"></div>
            <div class="glow-effect-2"></div>
            <h1 class="name" id="nameBtn">س ي ف</h1>
        </div>
    </div>

    <!-- PORTFOLIO PAGE -->
    <div class="portfolio-container" id="portfolioContainer">
        <div class="portfolio-bg-dollars" id="bgDollars"></div>

        <!-- Music Player - Autoplay -->
        <audio id="bgMusic" autoplay loop>
            <source src="hype.mp3" type="audio/mpeg">
        </audio>

        <!-- Photo Section 1 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG.7740.jpg" alt="Portfolio Photo 1" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Photo Section 2 -->
        <section class="photo-section">
            <div class="section-wrapper">
                <img src="IMG.7759.jpg" alt="Portfolio Photo 2" class="portfolio-img">
                <div class="img-overlay"></div>
            </div>
        </section>

        <!-- Footer Text -->
        <div class="footer-text">
            <p>inspired by the fear of being average...</p>
        </div>
    </div>

    <script>
        const landingPage = document.getElementById('landingPage');
        const portfolioContainer = document.getElementById('portfolioContainer');
        const nameBtn = document.getElementById('nameBtn');
        const bgMusic = document.getElementById('bgMusic');
        const portfolioImgs = document.querySelectorAll('.portfolio-img');
        const bgDollars = document.getElementById('bgDollars');
        const landingDollars = document.getElementById('landingDollars');

        // Create infinite falling dollars
        function createInfiniteDollars(container) {
            let dollarCount = 0;
            
            // Initial batch
            for (let i = 0; i < 40; i++) {
                createSingleDollar(container, i);
            }

            // Keep creating new dollars continuously
            setInterval(() => {
                if (dollarCount < 100) {
                    createSingleDollar(container, dollarCount);
                    dollarCount++;
                }
            }, 300);
        }

        function createSingleDollar(container, index) {
            const dollar = document.createElement('div');
            dollar.className = container === bgDollars ? 'dollar-bg' : 'dollar-rain';
            dollar.textContent = '$';
            dollar.style.left = Math.random() * 100 + '%';
            dollar.style.top = '-50px';
            
            const duration = Math.random() * 5 + 8;
            dollar.style.animationDuration = duration + 's';
            dollar.style.animationDelay = '0s';
            
            container.appendChild(dollar);

            // Remove dollar after animation completes
            setTimeout(() => {
                dollar.remove();
            }, (duration + 1) * 1000);
        }

        // Start infinite dollars on both pages
        createInfiniteDollars(landingDollars);

        // Click name to go to portfolio
        nameBtn.addEventListener('click', () => {
            landingPage.classList.add('hidden');
            portfolioContainer.classList.add('active');
            createInfiniteDollars(bgDollars);
            bgMusic.play().catch(err => console.log('Autoplay prevented'));
        });

        // Simple dark red animation on tap
        portfolioImgs.forEach(img => {
            img.addEventListener('click', () => {
                img.classList.add('active');
                setTimeout(() => img.classList.remove('active'), 400);
            });
        });
    </script>
</body>
</html>
